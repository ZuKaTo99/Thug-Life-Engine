<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#09070a" />
    <title>Thug Life Engine</title>
    <link rel="stylesheet" href="css/style.css" />
    <script type="importmap">
        {
            "imports": {
                "three": "https://cdn.jsdelivr.net/npm/three@0.184.0/build/three.module.min.js",
                "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.184.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <main class="wallpaper" id="wallpaper" aria-label="Thug Life Engine Wallpaper">
        
<div class="scene-backdrop scene-backdrop-day" aria-hidden="true"></div>
<div class="scene-backdrop scene-backdrop-night" aria-hidden="true"></div>

<img
    class="scene-image scene-image-day"
    src="assets/images/Thug_Life_original_image.jpeg"
    alt=""
    draggable="false"
/>
<img
    class="scene-image scene-image-night"
    src="assets/images/Thug_Life_Night-Version_image.png"
    alt=""
    draggable="false"
/>

        <div class="video-fx-layer rain-video-layer" aria-hidden="true">
            <video
                class="fx-video rain-overlay-video"
                id="rainOverlayVideo"
                src="assets/video/rain_night_overlay.mp4"
                autoplay
                muted
                loop
                playsinline
                preload="auto"
            ></video>
        </div>

        <div class="lightning-zone lightning-zone-left" id="lightningZoneLeft" aria-hidden="true">
            <video
                class="fx-video lightning-front-video lightning-front-video-left"
                id="lightningFrontVideoLeft"
                src="assets/video/lightning_front.mp4"
                muted
                playsinline
                preload="auto"
            ></video>
            <svg class="lightning-svg lightning-svg-left" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                <polyline class="lightning-aura" points="48,0 28,16 44,16 22,38 38,38 14,72" />
                <polyline class="lightning-core" points="48,0 28,16 44,16 22,38 38,38 14,72" />
            </svg>
        </div>

        <div class="lightning-zone lightning-zone-mid-right" id="lightningZoneMidRight" aria-hidden="true">
            <video
                class="fx-video lightning-front-video lightning-front-video-mid-right"
                id="lightningFrontVideoMidRight"
                src="assets/video/lightning_front.mp4"
                muted
                playsinline
                preload="auto"
            ></video>
            <svg class="lightning-svg lightning-svg-mid-right" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                <polyline class="lightning-aura" points="18,0 44,20 32,20 66,44 48,44 76,86" />
                <polyline class="lightning-core" points="18,0 44,20 32,20 66,44 48,44 76,86" />
            </svg>
        </div>

        <div class="lightning-zone lightning-zone-right" id="lightningZoneRight" aria-hidden="true">
            <video
                class="fx-video lightning-front-video lightning-front-video-right"
                id="lightningFrontVideoRight"
                src="assets/video/lightning_front.mp4"
                muted
                playsinline
                preload="auto"
            ></video>
            <svg class="lightning-svg lightning-svg-right" viewBox="0 0 100 100" preserveAspectRatio="none" aria-hidden="true">
                <polyline class="lightning-aura" points="54,0 76,16 58,18 82,36 62,38 86,58 70,60 92,82" />
                <polyline class="lightning-core" points="54,0 76,16 58,18 82,36 62,38 86,58 70,60 92,82" />
            </svg>
        </div>

        <canvas class="three-layer" id="threeCanvas" aria-hidden="true"></canvas>
        <canvas class="cloud-canvas" id="cloudCanvas" aria-hidden="true"></canvas>
        <canvas class="atmosphere-canvas" id="atmosphereCanvas" aria-hidden="true"></canvas>

        <div class="sky-wash" aria-hidden="true"></div>
        <div class="night-wash" aria-hidden="true"></div>
        <div class="sun-bloom" aria-hidden="true"></div>
        <div class="moon-bloom" aria-hidden="true"></div>
        <div class="horizon-haze" aria-hidden="true"></div>
        <div class="day-polish-layer" aria-hidden="true"></div>
        <div class="night-pearl-layer" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
            <span></span><span></span><span></span><span></span><span></span><span></span>
        </div>
        <div class="vinewood-glow" aria-hidden="true"></div>
        <div class="person-eye-glow" aria-hidden="true">
            <span class="eye-glow eye-glow-left"></span>
            <span class="eye-glow eye-glow-right"></span>
        </div>
        <div class="wet-reflection-layer" aria-hidden="true"></div>
        <div class="rain-glass-layer" aria-hidden="true"></div>
        <div class="light-leak light-leak-one" aria-hidden="true"></div>
        <div class="light-leak light-leak-two" aria-hidden="true"></div>
        <div class="cinematic-vignette" aria-hidden="true"></div>

        <section class="wall-clock" id="wallClock" aria-label="Uhr mit Wochentag und Datum">
            <div class="wall-clock-inner">
                <div class="clock-row clock-row-top">
                    <span class="clock-weekday" id="clockWeekday">Montag</span>
                    <span class="clock-date" id="clockDate">23. Juni 2026</span>
                </div>
                <div class="clock-row clock-row-main">
                    <span class="clock-time" id="clockTime">01:01</span>
                    <span class="clock-seconds" id="clockSeconds">00</span>
                </div>
            </div>
        </section>


        <section class="mini-runner" id="miniRunner" aria-label="Kleines Münzspiel">
            <div class="mini-hud" aria-live="polite">
                <span>Run <strong id="runCoins">0</strong></span>
                <span>Total <strong id="totalCoins">0</strong></span>
                <span>Rekord <strong id="recordCoins">0</strong></span>
            </div>

            <button class="car-switch" id="carSwitch" type="button" aria-label="Auto wechseln">
                Auto: Lädt...
            </button>

            <button class="phase-switch" id="phaseSwitch" type="button" aria-label="Tag Nacht Phase wechseln">
                Zeit: Auto
            </button>

            <div class="game-lane" id="gameLane">
                <div class="lane-glow" aria-hidden="true"></div>
                <div class="road-ambient" aria-hidden="true"></div>
                <div class="street-lamp-layer" aria-hidden="true">
                    <span class="street-lamp lamp-one"></span>
                    <span class="street-lamp lamp-two"></span>
                    <span class="street-lamp lamp-three"></span>
                    <span class="street-lamp lamp-four"></span>
                </div>
                <div class="coin-layer" id="coinLayer" aria-hidden="true"></div>

                <button class="runner" id="runner" type="button" aria-label="Auto springen lassen">
                    <span class="runner-shadow" aria-hidden="true"></span>
                    <span class="runner-tail" aria-hidden="true"></span>
                    <span class="runner-body" aria-hidden="true"></span>
                    <span class="runner-head" aria-hidden="true">
                        <span class="runner-ear runner-ear-left" aria-hidden="true"></span>
                        <span class="runner-ear runner-ear-right" aria-hidden="true"></span>
                        <span class="runner-eye runner-eye-left" aria-hidden="true"></span>
                        <span class="runner-eye runner-eye-right" aria-hidden="true"></span>
                        <span class="runner-nose" aria-hidden="true"></span>
                    </span>
                </button>

                <div class="ground-strip" aria-hidden="true"></div>
                <div class="game-hint" id="gameHint" aria-hidden="true">Auto klicken / Leertaste</div>
            </div>
        </section>
    </main>

    <script type="module" src="js/three-scene.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
